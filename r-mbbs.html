<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  <title id="dynamicTitle">University MBBS in Russia | Fees & Admission | NationScholars.in</title>
  <meta name="description" id="dynamicDescription" content="Study MBBS at top universities in Russia. Check fees, eligibility, hostel and admission details.">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      background: #f9fafc;
      color: #1e293b;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
    }

    /* Blue & Orange theme */
    :root {
      --primary-blue: #0f4c81;
      --primary-orange: #f77f00;
      --orange-light: #fff7ed;
      --blue-light: #eef4fb;
      --white: #ffffff;
      --gray-50: #f8fafc;
      --gray-100: #f1f5f9;
      --gray-200: #e2e8f0;
      --gray-600: #475569;
      --gray-800: #1e293b;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
      --shadow-card: 0 10px 25px -5px rgba(0,0,0,0.05), 0 8px 10px -6px rgba(0,0,0,0.02);
      --radius-lg: 1.25rem;
      --radius-md: 1rem;
      --radius-sm: 0.75rem;
    }

    h1, h2, h3 {
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    img {
      max-width: 100%;
      height: auto;
      display: block;
    }

    button, .btn {
      cursor: pointer;
      font-weight: 600;
      border: none;
      border-radius: 2.5rem;
      padding: 0.8rem 1.8rem;
      font-size: 1rem;
      transition: all 0.2s ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      text-decoration: none;
    }

    .btn-primary {
      background: var(--primary-orange);
      color: white;
      box-shadow: 0 4px 12px rgba(247, 127, 0, 0.3);
    }

    .btn-primary:hover {
      background: #e06e00;
      transform: translateY(-2px);
    }

    .btn-outline {
      background: transparent;
      border: 2px solid var(--primary-blue);
      color: var(--primary-blue);
    }

    .btn-outline:hover {
      background: var(--blue-light);
    }

    /* Hero */
    .hero {
      background: linear-gradient(145deg, #ffffff 0%, #f8fafc 100%);
      padding: 2rem 0 3rem;
    }

    .hero-grid {
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    @media (min-width: 768px) {
      .hero-grid {
        flex-direction: row;
        align-items: center;
      }
    }

    .hero-image {
      flex: 1;
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: var(--shadow-card);
      background: #e2e8f0;
    }

    .hero-image img {
      width: 100%;
      height: 280px;
      object-fit: cover;
    }

    @media (min-width: 768px) {
      .hero-image img {
        height: 340px;
      }
    }

    .hero-content {
      flex: 1;
    }

    .badge {
      background: var(--orange-light);
      color: #c2410c;
      font-weight: 600;
      padding: 0.4rem 1rem;
      border-radius: 2rem;
      font-size: 0.9rem;
      display: inline-block;
      margin-bottom: 0.8rem;
    }

    .university-name {
      font-size: 2.2rem;
      color: #0c4a6e;
      margin-bottom: 0.3rem;
    }

    .location {
      font-size: 1.2rem;
      color: #334155;
      display: flex;
      align-items: center;
      gap: 0.3rem;
      margin-bottom: 1.2rem;
    }

    .fee-badge-large {
      background: var(--primary-blue);
      color: white;
      padding: 0.5rem 1.5rem;
      border-radius: 2rem;
      font-weight: 700;
      font-size: 1.3rem;
      display: inline-block;
      margin: 0.8rem 0 1.5rem;
    }

    .hero-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
    }

    /* Quick Facts */
    .quick-facts {
      padding: 2.5rem 0 1.5rem;
    }

    .facts-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1rem;
    }

    @media (min-width: 640px) {
      .facts-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    @media (min-width: 1024px) {
      .facts-grid {
        grid-template-columns: repeat(6, 1fr);
      }
    }

    .fact-card {
      background: white;
      border-radius: var(--radius-md);
      padding: 1.2rem 0.8rem;
      text-align: center;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--gray-200);
      transition: transform 0.15s;
    }

    .fact-card:hover {
      transform: translateY(-3px);
    }

    .fact-icon {
      font-size: 1.6rem;
      margin-bottom: 0.3rem;
    }

    .fact-label {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--gray-600);
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .fact-value {
      font-weight: 700;
      font-size: 1.1rem;
      color: var(--primary-blue);
    }

    /* Sections */
    section {
      padding: 2.5rem 0;
    }

    .section-title {
      font-size: 1.8rem;
      color: #0c4a6e;
      margin-bottom: 1.5rem;
      position: relative;
      display: inline-block;
    }

    .section-title::after {
      content: '';
      position: absolute;
      left: 0;
      bottom: -6px;
      width: 60px;
      height: 4px;
      background: var(--primary-orange);
      border-radius: 2px;
    }

    .about-text {
      background: white;
      padding: 1.8rem;
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-sm);
      font-size: 1.05rem;
      color: #334155;
    }

    /* Why choose cards */
    .cards-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1.2rem;
      margin-top: 1rem;
    }

    @media (min-width: 640px) {
      .cards-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (min-width: 1024px) {
      .cards-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    .why-card {
      background: white;
      padding: 1.8rem 1.2rem;
      border-radius: var(--radius-md);
      border-left: 5px solid var(--primary-orange);
      box-shadow: var(--shadow-sm);
    }

    .why-card h3 {
      color: var(--primary-blue);
      margin-bottom: 0.5rem;
    }

    .fee-summary-box {
      background: var(--blue-light);
      border-radius: var(--radius-lg);
      padding: 2rem;
      display: flex;
      flex-wrap: wrap;
      gap: 2rem;
      justify-content: space-around;
      text-align: center;
    }

    .fee-item h3 {
      color: var(--primary-orange);
      font-size: 2rem;
    }

    /* Timeline */
    .timeline {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      margin-top: 2rem;
    }

    @media (min-width: 768px) {
      .timeline {
        flex-direction: row;
      }
    }

    .timeline-step {
      flex: 1;
      background: white;
      padding: 1.5rem;
      border-radius: var(--radius-md);
      text-align: center;
      box-shadow: var(--shadow-sm);
      position: relative;
    }

    .step-number {
      background: var(--primary-orange);
      color: white;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 0.8rem;
      font-weight: 700;
    }

    /* Form */
    .lead-form {
      background: white;
      border-radius: var(--radius-lg);
      padding: 2rem;
      box-shadow: var(--shadow-card);
      max-width: 480px;
      margin: 0 auto;
    }

    .form-group {
      margin-bottom: 1.2rem;
    }

    input {
      width: 100%;
      padding: 0.9rem 1.2rem;
      border: 1px solid var(--gray-200);
      border-radius: 2.5rem;
      font-size: 1rem;
      outline: none;
      transition: border 0.2s;
    }

    input:focus {
      border-color: var(--primary-orange);
    }

    /* WhatsApp */
    .whatsapp-float {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: #25D366;
      color: white;
      border-radius: 50%;
      width: 60px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      box-shadow: 0 8px 20px rgba(37, 211, 102, 0.4);
      z-index: 999;
      text-decoration: none;
      transition: 0.2s;
    }

    .whatsapp-float:hover {
      transform: scale(1.08);
    }

    /* Slider */
    .slider-container {
      overflow-x: auto;
      display: flex;
      gap: 1rem;
      padding: 1rem 0 0.5rem;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
    }

    .slider-card {
      min-width: 220px;
      background: white;
      border-radius: var(--radius-md);
      padding: 1.2rem;
      box-shadow: var(--shadow-sm);
      scroll-snap-align: start;
      border: 1px solid var(--gray-200);
      flex-shrink: 0;
    }

    .slider-card h4 {
      color: var(--primary-blue);
    }

    footer {
      text-align: center;
      padding: 2rem;
      color: #64748b;
      font-size: 0.9rem;
    }
  </style>
</head>
